data:
  unified_metadata: data/oasis/oasis_merged.csv
  splits: data/oasis/splits.json
  adni_raw: data/adni/raw
  oasis_raw: data/oasis/raw

training:
  batch_size: 2
  epochs: 20
  learning_rate: 0.0001
  num_workers: 0
  device: mps

model:
  architecture: resnet3d
  num_classes: 3
  input_channels: 1
  spatial_size: [128, 128, 128]

preprocessing:
  spacing: [2.0, 2.0, 2.0]
  intensity_range: [0, 3000]
  normalized_range: [0.0, 1.0]
  spatial_size: [128, 128, 128]

class_weights:
  CN: 1.0
  MCI: 8.0
  DEM: 4.0
