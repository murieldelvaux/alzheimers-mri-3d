data:
  adni_raw: data/adni/raw
  adni_preprocessed: data/adni/preprocessed
  oasis_raw: data/oasis/raw
  oasis_preprocessed: data/oasis/preprocessed
  unified_metadata: data/unified_metadata.csv

training:
  batch_size: 2
  epochs: 10
  learning_rate: 1e-4
  num_workers: 4
  device: cuda

model:
  architecture: resnet3d
  num_classes: 3
  input_channels: 1
  spatial_size: [128, 128, 128]

preprocessing:
  spacing: [2.0, 2.0, 2.0]
  intensity_range: [0, 3000]
  normalized_range: [0.0, 1.0]
  spatial_size: [128, 128, 128]
